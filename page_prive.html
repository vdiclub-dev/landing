<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Colixo - Dépôt colis</title>

<style>
body {
  font-family: Arial;
  background: #0a0a0a;
  color: white;
  padding: 30px;
}

.card {
  background: #111;
  padding: 20px;
  border-radius: 10px;
  margin-bottom: 20px;
}

input, select {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
  background: #1a1a1a;
  border: 1px solid #333;
  color: white;
}

button {
  padding: 12px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  margin-top: 10px;
}

.twint {
  background: black;
}

.validate {
  background: #ff6a00;
  color: black;
  font-weight: bold;
}

.print {
  background: #444;
  color: white;
}

.label {
  background: white;
  color: black;
  padding: 20px;
  margin-top: 20px;
  display: none;
}
</style>
</head>

<body>

<h1>📦 Dépôt Colixo</h1>

<div class="card">
  <input id="client" placeholder="Nom client">
  <input id="phone" placeholder="Téléphone">
  <input id="recipient" placeholder="Destinataire">
  <input id="address" placeholder="Adresse livraison">
  <input id="weight" type="number" placeholder="Poids (kg)">
  
  <select id="service">
    <option>Eco 48h</option>
    <option>Priority 24h</option>
    <option>Express</option>
  </select>

  <h2 id="price">Prix : CHF 0.00</h2>

  <button class="twint" onclick="payer()">
    <img src="https://go.twint.ch/static/img/button_dark_en.svg" height="40">
  </button>

  <button class="validate" onclick="apresPaiement()">
    J’ai effectué le paiement
  </button>
</div>

<div id="label" class="label">
  <h2>Étiquette Colis</h2>
  <p id="ref"></p>
  <p id="info"></p>
  <p id="priceLabel"></p>

  <img id="qr" width="120">

  <button class="print" onclick="window.print()">Imprimer</button>
</div>

<script>

let prix = 0;

function calculPrix() {
  let poids = parseFloat(document.getElementById("weight").value) || 0;
  let service = document.getElementById("service").value;

  let base = 7.5;

  if (service === "Priority 24h") base += 1;
  if (service === "Express") base += 8;

  if (poids > 2) base += 2;
  if (poids > 10) base += 3;
  if (poids > 20) base += 5;

  prix = base;

  document.getElementById("price").innerText =
    "Prix : CHF " + prix.toFixed(2);
}

setInterval(calculPrix, 500);

function payer() {
  window.open("https://go.twint.ch/1/e/tw?tw=acq.zY89V9VtQEidHoSlo3GK4kokhK07SfUCxAm9RyoruaIyHLWNEJSvIZsnD7N1FcLk.");
}

function apresPaiement() {

  let ref = "CLX-" + Date.now();

  document.getElementById("ref").innerText = "Référence : " + ref;

  document.getElementById("info").innerText =
    document.getElementById("client").value + " → " +
    document.getElementById("recipient").value;

  document.getElementById("priceLabel").innerText =
    "Montant payé : CHF " + prix.toFixed(2);

  document.getElementById("qr").src =
    "https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=" + ref;

  document.getElementById("label").style.display = "block";
}

</script>

</body>
</html>
